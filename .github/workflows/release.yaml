name: Build Push Update Release

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio/Development/backend/**'
      - 'portfolio/Development/frontend/**'
      - '.github/workflows/release.yaml'

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      BACKEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend
      FRONTEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Create release tag
        id: tag
        run: |
          RELEASE_TAG="v26.100.${GITHUB_RUN_NUMBER}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./portfolio/Development/backend
          file: ./portfolio/Development/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.release_tag }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./portfolio/Development/frontend
          file: ./portfolio/Development/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.release_tag }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update release tag in HelmRelease
        env:
          TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          yq -i '.spec.values.globalTag = strenv(TAG)' DevOps/K8S/release.yaml

      - name: Update chart version
        env:
          TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          yq -i '.version = strenv(TAG)' charts/portfolio/Chart.yaml
          yq -i '.appVersion = strenv(TAG)' charts/portfolio/Chart.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DevOps/K8S/release.yaml charts/portfolio/Chart.yaml
          git commit -m "chore(release): ${{ steps.tag.outputs.release_tag }} [skip ci]" || echo "No changes to commit"
          git push origin main