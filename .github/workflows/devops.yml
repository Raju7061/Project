name: GitOps-Release-Flow

on:
  push:
    branches: [ "main" ]
    paths:
      - 'portfolio/**'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Naya Semantic Version Tag generate karna (e.g., v24.106.0530)
      - name: Generate Release Tag
        id: tagger
        run: |
          VERSION="v24.$(date +%j.%H%M)" 
          echo "release_tag=$VERSION" >> $GITHUB_OUTPUT

      # 2. Build & Push BOTH Frontend and Backend with Global Tag
      - name: Build and Push Images
        run: |
          # Frontend Build & Push
          docker build -t 2024dock/portfolio-frontend:${{ steps.tagger.outputs.release_tag }} ./portfolio/frontend
          docker push 2024dock/portfolio-frontend:${{ steps.tagger.outputs.release_tag }}
          
          # Backend Build & Push
          docker build -t 2024dock/portfolio-backend:${{ steps.tagger.outputs.release_tag }} ./portfolio/backend
          docker push 2024dock/portfolio-backend:${{ steps.tagger.outputs.release_tag }}

      # 3. Update Helm Manifest (values.yaml)
      - name: Update Global Tag in GitOps Repo
        run: |
          git config --global user.name "flux-bot"
          git config --global user.email "flux@raju.local"
          
          # Ensure file exists and update the tag
          sed -i "s/globalTag: .*/globalTag: \"${{ steps.tagger.outputs.release_tag }}\"/" portfolio/k8s/values.yaml
          
          git add portfolio/k8s/values.yaml
          git commit -m "release: update global tag to ${{ steps.tagger.outputs.release_tag }} [skip ci]"
          git push