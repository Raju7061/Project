name: GitOps-CI-CD

on:
  push:
    branches: [ "main" ]
    # Workflow tabhi chalega jab in folders mein change ho
    paths:
      - 'portfolio/frontend/**'
      - 'portfolio/backend/**'
      - 'portfolio/k8s/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Isse Action ko repo mein wapas push karne ki permission milti hai
          token: ${{ secrets.GH_PAT }}

      - name: Set Image Tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build & Push Frontend
      - name: Build and Push Frontend
        run: |
          docker build -t 2024dock/portfolio-frontend:${{ steps.vars.outputs.tag }} ./portfolio/frontend
          docker push 2024dock/portfolio-frontend:${{ steps.vars.outputs.tag }}

      # 2. Build & Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t 2024dock/portfolio-backend:${{ steps.vars.outputs.tag }} ./portfolio/backend
          docker push 2024dock/portfolio-backend:${{ steps.vars.outputs.tag }}

      # 3. Update Kubernetes YAML Manifests (Plain YAML logic)
      - name: Update Manifests
        run: |
          git config --global user.name "flux-bot"
          git config --global user.email "flux@raju.local"
          
          # Frontend tag update: Purane tag ko naye commit SHA se replace karega
          sed -i "s|image: 2024dock/portfolio-frontend:.*|image: 2024dock/portfolio-frontend:${{ steps.vars.outputs.tag }}|" portfolio/k8s/frontend.yaml
          
          # Backend tag update
          sed -i "s|image: 2024dock/portfolio-backend:.*|image: 2024dock/portfolio-backend:${{ steps.vars.outputs.tag }}|" portfolio/k8s/backend.yaml
          
          # Changes ko commit aur push karna
          git add portfolio/k8s/frontend.yaml portfolio/k8s/backend.yaml
          git commit -m "chore: update image tags to ${{ steps.vars.outputs.tag }} [skip ci]"
          git push
