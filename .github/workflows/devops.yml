name: GitOps-CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'portfolio/frontend/**'
      - 'portfolio/backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set Image Tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push
      - name: Build Frontend
        run: |
          docker build -t 2024dock/portfolio-frontend:${{ steps.vars.outputs.tag }} ./portfolio/frontend
          docker push 2024dock/portfolio-frontend:${{ steps.vars.outputs.tag }}

      # Auto-Update Helm Values
      - name: Update Helm Manifest
        run: |
          git config --global user.name "flux-bot"
          git config --global user.email "flux@raju.local"
          # Maan lete hain aapka path k8s/values.yaml hai
          sed -i 's/tag: .*/tag: "${{ steps.vars.outputs.tag }}"/' k8s/values.yaml
          git add k8s/values.yaml
          git commit -m "chore: update image tag to ${{ steps.vars.outputs.tag }}"
          git push