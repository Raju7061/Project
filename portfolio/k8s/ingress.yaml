apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Hum rewrite-target ko hata rahe hain taaki poora path (/api/...) backend tak jaye
    # Isse backend ko wahi path milega jo aapne server.js me define kiya hai
spec:
  tls:
    - hosts:
        - raju.local
      secretName: portfolio-tls
  rules:
    - host: raju.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000

          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-frontend-service
                port:
                  number: 80