apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
    spec:
      containers:
        - name: frontend
          image: 2024dock/portfolio-frontend:3fbb6a5
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-frontend-service
spec:
  type: NodePort
  selector:
    app: portfolio-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080